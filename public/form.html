<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Supabase - JS Puro</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f0f9ff;
            display: flex;
            justify-content: center;
            padding: 2rem;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            width: 100%;
            max-width: 500px;
        }
        h2 { margin-top: 0; color: #0369a1; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; font-weight: 500; color: #334155; }
        input { 
            width: 100%; 
            padding: 0.5rem; 
            border: 1px solid #cbd5e1; 
            border-radius: 0.5rem; 
            box-sizing: border-box;
            outline: none;
        }
        input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 1px #38bdf8;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #0ea5e9;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #0284c7; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Novo Pedido (JS Puro)</h2>
        <form id="pedidoForm">
            <div class="form-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" required>
            </div>
            <div class="form-group">
                <label for="contato">Contato</label>
                <input type="text" id="contato" required>
            </div>
            <div class="form-group">
                <label for="tema">Tema</label>
                <input type="text" id="tema" required>
            </div>
            <div class="form-group">
                <label for="produto">Produto</label>
                <input type="text" id="produto" required>
            </div>
            <div class="form-group">
                <label for="valor">Valor</label>
                <input type="number" id="valor" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="quantidade">Quantidade</label>
                <input type="number" id="quantidade" required>
            </div>
            <div class="form-group">
                <label for="data_envio">Data de Envio</label>
                <input type="date" id="data_envio" required>
            </div>
            <div class="form-group">
                <label for="data_limite">Data Limite</label>
                <input type="date" id="data_limite" required>
            </div>
            <button type="submit">Salvar pedido</button>
        </form>
    </div>

    <script>
        document.getElementById('pedidoForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Evita o recarregamento da página
            
            // Coleta os dados do formulário
            const data = {
                nome: document.getElementById('nome').value,
                contato: document.getElementById('contato').value,
                tema: document.getElementById('tema').value,
                produto: document.getElementById('produto').value,
                valor: parseFloat(document.getElementById('valor').value),
                quantidade: parseInt(document.getElementById('quantidade').value, 10),
                data_envio: document.getElementById('data_envio').value,
                data_limite: document.getElementById('data_limite').value
            };

            try {
                // Faz a requisição POST usando fetch (JavaScript Puro)
                const response = await fetch('https://hqvwjpqehclqrtahjqkt.supabase.co/rest/v1/pedidos', {
                    method: 'POST',
                    headers: {
                        'apikey': 'sb_publishable_ozWh_BdL4Wh5z1RTThCehw_qZJakgX1',
                        'Authorization': 'Bearer sb_publishable_ozWh_BdL4Wh5z1RTThCehw_qZJakgX1',
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    // Sucesso
                    console.log('Pedido inserido com sucesso!');
                    alert('Salvo com sucesso');
                    document.getElementById('pedidoForm').reset(); // Limpa o formulário
                } else {
                    // Erro da API do Supabase
                    const errorData = await response.json();
                    console.error('Erro retornado pelo Supabase:', errorData);
                    alert('Erro ao salvar');
                }
            } catch (error) {
                // Erro de rede ou de execução
                console.error('Erro na requisição fetch:', error);
                alert('Erro ao salvar');
            }
        });
    </script>
</body>
</html>
